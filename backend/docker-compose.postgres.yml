services:
  postgres:
    image: postgres:16
    container_name: deuna-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
      POSTGRES_DB: deuna_negocios
    ports:
      - "5432:5432"
    volumes:
      - deuna_pgdata:/var/lib/postgresql/data
volumes:
  deuna_pgdata:
